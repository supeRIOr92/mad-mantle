# subgraph/subgraph.yaml — RealClaw Custom Subgraph Manifest
# Unified index: Agni + Merchant Moe LB 2.2 + Fluxion (UniV3)
# Chain: Mantle (chain_id 5000)
# The Graph Protocol

specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:

  # ── Agni Finance ───────────────────────────────────────
  - kind: ethereum
    name: AgniFactory
    network: mantle
    source:
      address: "0x25780dc8Fc3cfBD75F33bFDAB65e969b603b2035"
      abi: AgniFactory
      startBlock: 1000000 # adjust to Agni deploy block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: AgniFactory
          file: ./abis/AgniFactory.json
        - name: AgniPool
          file: ./abis/AgniPool.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed uint24,int24,address)
          handler: handleAgniPoolCreated
      file: ./mappings.ts

  - kind: ethereum/contract
    name: AgniPool
    network: mantle
    source:
      abi: AgniPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: AgniPool
          file: ./abis/AgniPool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleAgniSwap
      file: ./mappings.ts

  # ── Merchant Moe LB 2.2 ────────────────────────────────
  - kind: ethereum
    name: MoeLBFactory
    network: mantle
    source:
      address: "0xa6630671775c4EA2743840F9A5016dCf2A104054"
      abi: MoeLBFactory
      startBlock: 1000000 # adjust to Moe deploy block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: MoeLBFactory
          file: ./abis/MoeLBFactory.json
        - name: MoeLBPair
          file: ./abis/MoeLBPair.json
      eventHandlers:
        - event: LBPairCreated(indexed address,indexed address,indexed uint256,address,uint256)
          handler: handleMoePairCreated
      file: ./mappings.ts

  - kind: ethereum/contract
    name: MoeLBPair
    network: mantle
    source:
      abi: MoeLBPair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: MoeLBPair
          file: ./abis/MoeLBPair.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,uint24,bytes32,bytes32)
          handler: handleMoeSwap
      file: ./mappings.ts

  # ── Fluxion (UniV3 fork) ───────────────────────────────
  - kind: ethereum
    name: FluxionFactory
    network: mantle
    source:
      address: "0x560d064493de5a23e72ed916caf92ec6e8924948"
      abi: FluxionFactory
      startBlock: 1000000 # adjust to Fluxion deploy block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: FluxionFactory
          file: ./abis/FluxionFactory.json
        - name: FluxionPool
          file: ./abis/FluxionPool.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed uint24,int24,address)
          handler: handleFluxionPoolCreated
      file: ./mappings.ts

  - kind: ethereum/contract
    name: FluxionPool
    network: mantle
    source:
      abi: FluxionPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: FluxionPool
          file: ./abis/FluxionPool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleFluxionSwap
      file: ./mappings.ts