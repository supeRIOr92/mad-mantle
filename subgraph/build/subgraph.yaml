specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: AgniFactory
    network: mantle
    source:
      address: "0x25780dc8Fc3cfBD75F33bFDAB65e969b603b2035"
      abi: AgniFactory
      startBlock: 1000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
      abis:
        - name: AgniFactory
          file: AgniFactory\AgniFactory.json
        - name: AgniPool
          file: AgniFactory\AgniPool.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed uint24,int24,address)
          handler: handleAgniPoolCreated
      file: AgniFactory\AgniFactory.wasm
  - kind: ethereum/contract
    name: AgniPool
    network: mantle
    source:
      abi: AgniPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: AgniPool
          file: AgniPool\AgniPool.json
      eventHandlers:
        - event: Swap(indexed address,indexed
            address,int256,int256,uint160,uint128,int24,uint128,uint128)
          handler: handleAgniSwap
      file: AgniFactory\AgniFactory.wasm
  - kind: ethereum
    name: MoeLBFactory
    network: mantle
    source:
      address: "0xa6630671775c4EA2743840F9A5016dCf2A104054"
      abi: MoeLBFactory
      startBlock: 1000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
      abis:
        - name: MoeLBFactory
          file: MoeLBFactory\MoeLBFactory.json
        - name: MoeLBPair
          file: MoeLBFactory\MoeLBPair.json
      eventHandlers:
        - event: LBPairCreated(indexed address,indexed address,indexed uint256,address,uint256)
          handler: handleMoePairCreated
      file: AgniFactory\AgniFactory.wasm
  - kind: ethereum/contract
    name: MoeLBPair
    network: mantle
    source:
      abi: MoeLBPair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: MoeLBPair
          file: MoeLBPair\MoeLBPair.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,uint24,bytes32,bytes32,uint24,bytes32,bytes32)
          handler: handleMoeSwap
      file: AgniFactory\AgniFactory.wasm
  - kind: ethereum
    name: FluxionPool
    network: mantle
    source:
      address: "0x560d064493de5a23e72ed916caf92ec6e8924948"
      abi: FluxionPool
      startBlock: 937638
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - Pool
        - Wallet
        - VolumeBucket
        - DailyPoolSnapshot
      abis:
        - name: FluxionPool
          file: FluxionPool\FluxionPool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleFluxionSwap
      file: AgniFactory\AgniFactory.wasm
